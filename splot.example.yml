# Example splot configuration.
#
# Copy this file to `splot.yml` and replace the placeholder WireGuard keys,
# endpoints, and addresses with your own. `splot.yml` is git-ignored so your
# real keys never end up in the repo.
#
# Each router runs `splot` and identifies itself by matching its local
# WireGuard public key against one of the nodes' `publicKey` values.
#
# Addresses below use the RFC 5737 / RFC 1918 documentation ranges.

# Subnet for the WireGuard mesh substrate that connects the routers.
meshNetwork: 10.100.0.0/24

# Global clients: roaming devices (phones, laptops) reachable across the
# whole mesh. Tags applied here are usable in any service's `allowFrom`.
clients:
  Phone:
    publicKey: REPLACE_WITH_PHONE_WG_PUBLIC_KEY
    meshIp: 10.100.0.100
    macs: aa:bb:cc:00:00:01
    tags: admin
    # Per-node addresses let the phone get a static lease on a router's LAN.
    ips:
      Home:
        lan: 192.168.1.50

nodes:
  # Internet-facing router. Hosts services and exposes some to the WAN
  # through the firewall zone named in `wanZone`.
  Home:
    publicKey: REPLACE_WITH_HOME_WG_PUBLIC_KEY
    endpoint: 203.0.113.10
    listenPort: 51820
    meshIp: 10.100.0.1
    wanZone: wan

    services:
      # SSH to the router itself, reachable from anything tagged `admin`
      # (the phone, the VPN laptop) anywhere on the mesh.
      ssh:
        port: 22
        proto: tcp
        allowFrom: admin

    zones:
      lan:
        address: 192.168.1.1/24
        devices:
          printer:
            ip: 192.168.1.16
            macs: aa:bb:cc:00:00:02
            services:
              print:
                port: 9100
                proto: tcp
                allowFrom: admin

          nas:
            ip: 192.168.1.20
            macs: aa:bb:cc:00:00:03
            services:
              # Reachable from admin devices on the mesh AND published to the
              # public internet. "8443:443" forwards external 8443 to the
              # NAS's internal 443; `sources` restricts the WAN side to one
              # office CIDR (omit `sources` to expose it publicly).
              https:
                port: "8443:443"
                proto: tcp
                allowFrom: admin
                wan:
                  via: [Home]
                  sources: ["198.51.100.0/24"]

    vpnInterfaces:
      # An extra WireGuard interface for an external device, fully managed by
      # splot (created in OpenWRT, named after the interface).
      guests:
        listenPort: 51821
        address: 10.8.0.1/24
        clients:
          laptop:
            publicKey: REPLACE_WITH_LAPTOP_WG_PUBLIC_KEY
            ip: 10.8.0.2
            tags: admin

  # Remote site. No WAN exposure of its own — reachable over the mesh.
  Cabin:
    publicKey: REPLACE_WITH_CABIN_WG_PUBLIC_KEY
    endpoint: 203.0.113.20
    listenPort: 51820
    meshIp: 10.100.0.2

    zones:
      lan:
        address: 192.168.2.1/24
        devices:
          camera:
            ip: 192.168.2.30
            macs: aa:bb:cc:00:00:04
            services:
              # The camera's RTSP stream, viewable from admin devices
              # anywhere on the mesh — but never from the public internet.
              rtsp:
                port: 554
                proto: tcp
                allowFrom: admin
